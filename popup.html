<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>TCG Pricer</title>
  <link rel="stylesheet" href="popup.css">
</head>
<body>
  <div class="container">
    <h1>TCG Pricer</h1>

    <div class="search-bar">
      <input type="text" id="card-search" placeholder="Search card name..." />
      <button id="search-btn">Search</button>
    </div>

    <div id="results" class="results">
      <p class="placeholder">Enter a card name to look up prices.</p>
    </div>
  </div>

  <script src="popup.js"></script>
</body>
</html>
